# Alembic configuration for GEO Analyzer
# Run from the project root: C:\geo_tool\
#
#   alembic upgrade head          — apply all pending migrations
#   alembic revision --autogenerate -m "add column foo"  — generate new migration
#   alembic downgrade -1          — roll back the last migration
#   alembic stamp head            — mark DB as up-to-date without running migrations
#                                    (use this once after first adding Alembic to an existing DB)
#
# NOTE: sqlalchemy.url is overridden programmatically in migrations/env.py
#       using the DATABASE_PATH computed in api/models/database.py, so the
#       value below is never actually used — it is kept as a placeholder only.

[alembic]
script_location = migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# sqlalchemy.url is set at runtime in env.py
sqlalchemy.url = sqlite:///api/data/analyzer.db

[post_write_hooks]
# (optional) hooks that run after alembic generates a new migration file
# e.g. to auto-format with black: hooks = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
