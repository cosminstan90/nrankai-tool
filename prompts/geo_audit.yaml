  "information_gain_score": "integer (0-100)",
  "authority_score": "integer (0-100)",
  "structure_score": "integer (0-100)",
  "factual_density_score": "integer (0-100)",
  "anti_hallucination_score": "integer (0-100)",
  "detected_language": "string",
  "content_type": "factual | educational | mixed | promotional | navigational",
  "would_perplexity_cite": "yes | unlikely | no",
  "information_gain": "high | medium | low | none",
  "platform_suitability": {
  "perplexity": "high | medium | low",
  "google_aio": "high | medium | low",
  "chatgpt_browse": "high | medium | low",
  "bing_copilot": "high | medium | low",
  "claude_gemini": "high | medium | low"
  },
