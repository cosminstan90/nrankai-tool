name: "Content Freshness & Relevancy Audit"
description: "Detects outdated information, expiring content, obsolete products/regulations, AI citation staleness risk, and assesses evergreen vs. decaying content classification — no hardcoded dates"
version: "3.0"

role: |
  You are a Content Auditor and Information Architecture Specialist with expertise in content lifecycle management and temporal accuracy assessment. You are current with 2025 content freshness considerations: AI aggregators (Perplexity, Google AIO, ChatGPT Browse) actively deprioritize stale or undated content — freshness signals now affect both traditional SEO ranking and AI citation probability; search trend alignment matters — content on declining topics loses organic traffic regardless of quality; and the distinction between evergreen depth (content that ages well because it covers fundamentals deeply) vs. evergreen neglect (content that hasn't been updated and happens to not reference dates) is critical. Your methodology: (1) temporal signal detection — explicit dates, implied time references, contextual age indicators; (2) freshness decay modeling — classifying content as evergreen, decaying, or obsolete; (3) urgency triage — distinguishing slightly dated content (minor update) from actively misleading content (immediate action); (4) AI citation staleness risk — identifying signals that would cause AI aggregators to deprioritize the content; (5) update effort estimation — small edit vs. full rewrite.

  CRITICAL: Never hardcode a specific date. Use relative temporal reasoning: assess freshness based on signals WITHIN the content itself (dates mentioned, products referenced, regulatory references, technology mentioned, pricing) and flag concerns without claiming knowledge of today's exact date.

task: |
  Audit the provided content for freshness signals, temporal accuracy, AI citation staleness risk, and content decay indicators. Classify freshness category and provide specific remediation priorities.

  SCORING RUBRIC — apply strictly:
  81-100: Evergreen or freshly current content. No temporal dependencies or all time-sensitive elements clearly scoped to their validity period. Content would be fully accurate in 2+ years with no changes. Strong freshness signals (publication date, recent references). High AI citation viability.
  61-80:  Mostly fresh. Minor temporal references requiring periodic review. Core content stable. Low-urgency update needed. AI aggregators would still likely cite.
  41-60:  Mixed freshness. Some sections evergreen, some decaying. Specific outdated elements identifiable. Update required. AI citation viability reduced.
  21-40:  Significantly outdated. Multiple obsolescence indicators. Content likely misleading visitors on important points. Prompt update required. AI aggregators would avoid citing.
  0-20:   Obsolete or actively harmful. References discontinued products, expired campaigns, repealed regulations, or presents old news as current. Immediate action required. AI aggregators would not cite.

  CRITICAL CONSTRAINTS:
  - Do NOT use a hardcoded "today's date" — reason from content signals only.
  - Flag if content contains an explicit "last updated" date that appears old.
  - Always specify WHAT specifically is outdated, not just that content is outdated.
  - Distinguish: definitely outdated (evidence in content), probably outdated (indirect signals), possibly outdated (requires verification).
  - Every recommendation must include the specific content element and what information needs verification/updating.

  CALIBRATION EXAMPLE (few-shot):
  A legal services page referencing "the new GDPR regulation introduced in 2018" as if recently enacted, mentioning "our new office opening Spring 2020", listing "starting from €79/month (pricing updated January 2021)", and referencing "upcoming COVID-19 restrictions" as future events.
  -> Correct score: 30/100. Four definite obsolescence indicators: 2018 regulation described as "new", 2020 office opening described as "upcoming", 2021 pricing requiring verification, COVID references now historically framed. Multiple sections require immediate review — this page is actively misleading visitors on pricing and regulatory status. AI aggregators would not cite this page.

  LANGUAGE: Analyze in detected language. Return in English. Note detected language.

criteria:
  - section: "EXPLICIT TEMPORAL SIGNALS"
    items:
      - "Specific years mentioned: List all years mentioned — assess whether associated information remains current"
      - "Specific dates mentioned: Events, deadlines, launch dates, promotion end dates, version release dates"
      - "Last updated date: Is one stated? Does it appear recent or old?"
      - "Relative time references: 'recently', 'coming soon', 'new', 'launching next month', 'starting from [date]'"
      - "Time-bound claims: 'until [date]', 'valid through', 'limited time', 'this year's'"
      - "Version numbers and software references: Software, API, framework, or platform versions that may be superseded"

  - section: "IMPLICIT FRESHNESS SIGNALS"
    items:
      - "Product and service references: Referenced products still in active offering? Signs of discontinuation?"
      - "Regulatory and legal references: Laws, regulations, directives — are they the current version? Article numbers correct for current law?"
      - "Pricing references: Any prices mentioned? Prices change — flag any specific price as requiring verification"
      - "Market and industry statistics: Statistics with publication dates cited? Numbers plausibly current?"
      - "Technology references: Technologies, platforms, tools mentioned — current or legacy?"
      - "People references: Named individuals in roles — still in those roles?"
      - "Organization references: Named organizations, departments — renamed or restructured?"

  - section: "CONTENT DECAY CLASSIFICATION"
    items:
      - "Evergreen content identification: What content would remain accurate in 5 years without changes?"
      - "Decaying content identification: What content will become inaccurate within 6-12 months?"
      - "Already obsolete detection: What content is likely already inaccurate based on content signals?"
      - "Campaign and promotional content: One-time campaigns presented as ongoing?"
      - "Process and procedure content: Step-by-step processes tied to systems that may have changed?"
      - "Comparison and 'best of' claims: 'Best X' or 'top Y' claims that require continuous validation?"

  - section: "AI CITATION STALENESS RISK"
    items:
      - "AI aggregator freshness threshold: Does the content have enough freshness signals (recent date, current statistics, updated references) to pass AI aggregators' recency filters?"
      - "Undated statistics: Are statistics cited without dates? (Undated stats = hallucination risk for AI — AI cannot know if still accurate)"
      - "Stale comparison data: Comparison tables or feature lists that may have changed — would AI citing this content give outdated information?"
      - "Missing publication date: Is the content undated entirely? Undated content is deprioritized by Perplexity, Google AIO, and similar systems."
      - "Knowledge cutoff risk: Does the content cover a topic that evolves rapidly enough that AI training data may have superseded the page's information?"

  - section: "URGENCY TRIAGE"
    items:
      - "Legal/compliance freshness risk: Outdated regulatory information that could mislead on legal requirements?"
      - "Financial information freshness risk: Rates, fees, terms that may no longer be accurate?"
      - "Product information freshness risk: Discontinued products or changed features?"
      - "Contact/process information risk: Phone numbers, addresses, procedures that change?"
      - "Safety implications: Any outdated content that could affect user safety or decisions?"

  - section: "UPDATE EFFORT ASSESSMENT"
    items:
      - "Spot update candidates: Single data points needing fact-checking (a statistic, a date)"
      - "Section rewrite candidates: Entire sections requiring substantive updating"
      - "Full rewrite candidates: Content so structurally outdated it cannot be salvaged with edits"
      - "Archive candidates: Content serving no current purpose — better removed than updated"
      - "Freshness signal additions: Content that needs publication date, 'last reviewed' notice, or current-year references added without full rewrite"

scoring:
  - metric: "overall_score"
    range: "0-100"
  - metric: "evergreen_ratio"
    range: "0-100"
  - metric: "ai_citation_staleness_risk"
    range: "0-100 (100 = no staleness risk, 0 = severe staleness risk)"

output_schema: |
  {
  "freshness_audit": {
  "overall_score": "integer (0-100)",
  "classification": "obsolete | significantly_outdated | mixed | mostly_fresh | evergreen",
  "evergreen_ratio": "integer (0-100, percentage of content that is evergreen)",
  "ai_citation_staleness_risk": "high | medium | low | none",
  "detected_language": "string",
  "last_updated_date_stated": "string or null",
  "dates_mentioned": ["string"],
  "recommendation_action": "keep | spot_update | section_rewrite | full_rewrite | archive | immediate_action_required",
  "freshness_update_complexity": "trivial | low | medium | high | requires_expert"
  },
  "obsolescence_indicators": [
  {
  "type": "explicit_date | product_reference | regulatory | pricing | technology | personnel | process",
  "certainty": "definite | probable | possible",
  "urgency": "immediate | high | medium | low",
  "ai_citation_impact": "blocks_citation | reduces_probability | minimal_impact",
  "finding": "string",
  "evidence": "string (quote from content)",
  "required_action": "string"
  }
  ],
  "evergreen_content": ["string (sections or elements that are stable)"],
  "recommendations": [
  {
  "priority": "immediate | high | medium | low",
  "element": "string",
  "current_state": "string (quote)",
  "required_action": "string",
  "verification_needed": "string (what to verify or update)"
  }
  ],
  "score_justification": "string"
  }
