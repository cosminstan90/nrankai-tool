  "value_proposition_score": "integer (0-100)",
  "differentiation_score": "integer (0-100)",
  "messaging_score": "integer (0-100)",
  "topical_gap_score": "integer (0-100)",
  "ai_visibility_score": "integer (0-100)",
  "detected_language": "string",
  "primary_value_proposition": "string (what the LLM identifies as the core claim)",
  "target_audience_detected": "string",
  "generic_claims_found": ["string"],
  "unsupported_superlatives": ["string"],
  "ai_overview_citation_readiness": "high | medium | low | none",
  "entity_authority_signals": "strong | moderate | weak | absent",
  "scope_note": "Single-page content analysis. No live competitor comparison performed."
  },
  "usps_identified": [
  {
  "claim": "string",
  "specificity": "specific | moderate | generic",
  "evidence_present": "boolean",
  "competitive_distinctiveness": "high | medium | low"
  }
  ],
